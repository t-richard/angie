title: "Vente"
slug: "vente"
competences:
  - id: "vente-1"
    title: "Identifier les besoins clients et proposer une solution adaptée"
    summary: "?"
    body: "Au cours de mes différentes expériences à la Brasserie La Choulette et chez Choulette Expérience, j’ai appris à analyser les besoins de chaque client afin de lui proposer une offre adaptée. L’écoute active et le questionnement m’ont permis de mieux comprendre leurs attentes et de les orienter vers les produits les plus pertinents. Cette capacité à personnaliser le conseil contribue directement à la satisfaction client et à la qualité de la relation commerciale."
    image: "/assets/images/placeholder.svg"
  - id: "vente-2"
    title: "Développer le chiffre d'affaires et le panier moyen"
    summary: "?"
    body: "Chez Choulette Expérience, j’ai participé activement au développement des ventes grâce à la mise en valeur des produits, au conseil personnalisé et aux ventes complémentaires. Ces actions ont contribué à l’augmentation du chiffre d’affaires ainsi qu’à l’amélioration du panier moyen."
    image: "/assets/images/placeholder.svg"
  - id: "vente-3"
    title: "Construire une offre commerciale adaptée aux besoins des clients"
    summary: "?"
    body: "Au sein de SOFRATEL Entreprise Adaptée, je participe à la réponse aux appels d’offres. Cette mission nécessite d’analyser précisément les besoins exprimés par les clients, d’étudier les cahiers des charges et de construire une réponse adaptée aux capacités de l’entreprise."
    image: "/assets/images/placeholder.svg"
  - id: "vente-4"
    title: "Négociation"
    summary: "Défense des marges et recherche d'accords gagnant-gagnant."
    body: "Préparation et conduite de négociations commerciales. Participation au concours Les Négociales suite à une sélection parmi les meilleurs de la promotion. "
    image: "/assets/images/placeholder.svg"
  -