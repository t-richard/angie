title: "Vente"
slug: "vente"
competences:
  - id: "vente-1"
    title: "Prospection commerciale"
    summary: "Identification et qualification de nouveaux prospects à fort potentiel."
    body: "Mise en place de stratégies de prospection multicanal : cold emailing, LinkedIn outreach, appels sortants. Qualification des leads selon des critères BANT et alimentation du pipeline commercial pour garantir un flux constant d'opportunités."
    image: "/assets/images/placeholder.svg"
  - id: "vente-2"
    title: "Conduite de l'entretien de vente"
    summary: "Maîtrise des étapes clés de l'entretien pour conclure efficacement."
    body: "Application des méthodes de vente consultative : écoute active, découverte des besoins (SPIN Selling), argumentation sur la valeur et gestion des objections. Capacité à adapter le discours commercial au profil et aux enjeux de l'interlocuteur."
    image: "/assets/images/placeholder.svg"
  - id: "vente-3"
    title: "Négociation"
    summary: "Défense des marges et recherche d'accords gagnant-gagnant."
    body: "Préparation et conduite de négociations commerciales complexes : définition des zones d'accord possibles, techniques de concession, ancrage et gestion de la pression tarifaire. Objectif : préserver la valeur tout en satisfaisant les attentes du client."
    image: "/assets/images/placeholder.svg"
  - id: "vente-4"
    title: "Gestion du pipeline"
    summary: "Suivi rigoureux des opportunités commerciales dans le CRM."
    body: "Utilisation et mise à jour régulière du CRM (Salesforce, HubSpot) pour gérer le pipeline : qualification des opportunités, prévisions de vente, relances planifiées. Analyse des taux de conversion par étape pour identifier les points d'amélioration."
    image: "/assets/images/placeholder.svg"
  - id: "vente-5"
    title: "Closing & signature"
    summary: "Techniques de conclusion pour transformer les opportunités en contrats."
    body: "Maîtrise des techniques de closing : résumé des bénéfices, création d'urgence, traitement des derniers freins. Rédaction et finalisation des propositions commerciales et contrats en coordination avec les équipes juridiques et financières."
    image: "/assets/images/placeholder.svg"
  - id: "vente-6"
    title: "Fidélisation client"
    summary: "Développement du chiffre d'affaires sur le portefeuille existant."
    body: "Stratégies d'upsell et de cross-sell sur la base clients existante. Suivi de la satisfaction post-vente, identification des signaux d'attrition et mise en place de plans d'action pour renforcer l'engagement et augmenter la valeur vie client."
    image: "/assets/images/placeholder.svg"
