title: "Business Développement"
slug: "business-developpement"
competences:
  - id: "bizdev-1"
    title: "Répondre à des appels d’offres et développer de nouvelles opportunités"
    summary: "Détection de nouveaux marchés et partenariats à fort potentiel."
    body: "Chez SOFRATEL Entreprise Adaptée, je participe à la réponse aux appels d’offres en analysant les besoins exprimés par les clients et en construisant des propositions adaptées. Cette mission me permet de contribuer au développement commercial de l’entreprise tout en développant ma capacité à identifier et saisir de nouvelles opportunités d’affaires."
    image: "/assets/images/opportinutes.jpeg"
  - id: "bizdev-2"
    title: "Réaliser un diagnostic commercial et proposer des axes d’amélioration"
    summary: "?"
    body: "L’analyse des ventes et des retours clients m’a permis de mettre en évidence plusieurs axes d’amélioration visant à renforcer la performance commerciale. Par exemple, certaines modifications de mise en avant des produits ont permis d’augmenter leur visibilité et leurs ventes."
    image: "/assets/images/placeholder.svg"
  - id: "bizdev-3"
    title: "Développer l’activité commerciale grâce à l’analyse des besoins du marché"
    summary: "?"
    body: "L’écoute des clients et l’observation du marché constituent des leviers importants de développement. Mes expériences professionnelles m’ont permis d’identifier des attentes émergentes et de participer à des réflexions visant à adapter l’offre de l’entreprise aux évolutions de la demande."
    image: "/assets/images/placeholder.svg"
  - id: "bizdev-4"
    title: "Gestion de projet"
    summary: "Porte ouverte de SOFRATEL Entreprise Adaptée."
    body: "Coordination et réalisation du projets afin de développer les opportunités commerciales. "
    image: "/assets/images/placeholder.svg"
  - id : "bizdev-5"
    title : "Identifier les besoins clients et proposer une solution adaptée"
    summary: "?"
    body: "Dans le cadre de mes études lors d'une SAE, j'ai réalisé un questionnaire afin de mieux connaître les envies, les attentes et les besoins des consommateurs. Grâce aux réponses obtenues, j'ai analysé les préférences des clients et repérer certains points importants à prendre en compte dans mon offre."
    image: "
