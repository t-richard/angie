title: "Business Développement"
slug: "business-developpement"
competences:
  - id: "bizdev-1"
    title: "Identification d'opportunités"
    summary: "Détection de nouveaux marchés et partenariats à fort potentiel."
    body: "Veille stratégique et sectorielle pour identifier les tendances émergentes, les segments de marché inexploités et les partenaires potentiels. Qualification des opportunités selon leur alignement avec la stratégie d'entreprise et leur potentiel de croissance."
    image: "/assets/images/opportinutes.jpeg"
  - id: "bizdev-2"
    title: "Développement de partenariats"
    summary: "Structuration d'accords stratégiques mutuellement bénéfiques."
    body: "Identification, approche et négociation de partenariats commerciaux, technologiques ou institutionnels. Rédaction de term sheets, LOI et contrats de partenariat. Suivi de la relation partenaire pour garantir l'atteinte des objectifs communs."
    image: "/assets/images/placeholder.svg"
  - id: "bizdev-3"
    title: "Planification stratégique"
    summary: "Construction de plans de croissance ambitieux et réalistes."
    body: "Élaboration de business plans et de road maps de développement : analyse de marché, modélisation financière, définition des priorités et des ressources nécessaires. Présentation aux dirigeants et investisseurs pour obtenir les arbitrages et financements."
    image: "/assets/images/placeholder.svg"
  - id: "bizdev-4"
    title: "Go-to-market"
    summary: "Lancement structuré de nouvelles offres sur le marché."
    body: "Définition et exécution de stratégies go-to-market : segmentation, ciblage, positionnement, choix des canaux de distribution et plans d'activation. Coordination des équipes marketing, ventes et produit pour assurer un lancement cohérent et impactant."
    image: "/assets/images/placeholder.svg"
  - id: "bizdev-5"
    title: "Analyse financière"
    summary: "Évaluation de la rentabilité des projets et des décisions d'investissement."
    body: "Modélisation de business cases, calcul de ROI, analyse de la marge et du point mort. Utilisation de ces analyses pour prioriser les initiatives de développement et arbitrer entre plusieurs scénarios de croissance."
    image: "/assets/images/placeholder.svg"
  - id: "bizdev-6"
    title: "Gestion de projet"
    summary: "Pilotage opérationnel des initiatives de développement commercial."
    body: "Coordination de projets transverses impliquant plusieurs équipes (marketing, juridique, finance, opérations). Utilisation de méthodologies agiles et de outils de gestion de projet (Notion, Asana, Jira) pour respecter les délais et les objectifs."
    image: "/assets/images/placeholder.svg"
