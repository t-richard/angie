title: "Communication"
slug: "communication"
competences:
  - id: "communication-1"
    title: "Gérer la relation client multicanale"
    summary: "Communication client sur différents canaux"
    body: "Tout au long de mon parcours, j’ai développé ma capacité à communiquer avec les clients à travers différents canaux : accueil physique, téléphone, emails professionnels et relances commerciales. Cette diversité d’échanges m’a permis d’adapter ma communication en fonction du contexte et des attentes de chaque interlocuteur afin d’assurer une relation client fluide et efficace."
    image: "assets/images/Screenshot 2026-06-12 19.39.35.png"
  - id: "communication-2"
    title: "Prise de parole en public"
    summary: "Présentation confiante et structurée devant différents types d'audiences."
    body: "Animation commerciale, soutenances, et présentations clients. Gestion du stress et de la posture pour une communication verbale et non verbale efficace."
    image: "assets/images/Screenshot 2026-06-12 20.10.41.png"
  - id: "communication-3"
    title: "Concevoir des supports de communication adaptés"
    summary: "Affiches promotionnel, fiches produits..."
    body: "Dans le cadre de différents projets universitaires et professionnels, j’ai participé à la création de supports de communication destinés à promouvoir une offre ou à informer une cible spécifique."
    image: "assets/images/Screenshot 2026-06-12 20.12.11.png"
  - id: "communication-4"
    title: "Gérer la communication digitale de l'entreprise"
    summary: "Création de contenus digitaux"
    body: "Au cours de mes expériences universitaires, j’ai participé à la création de contenus sur les réseaux sociaux afin de promouvoir l'ouverture d'une friperie pour homme."
    image: "assets/images/Screenshot 2026-06-13 15.27.58.png"
