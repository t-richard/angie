title: "Communication"
slug: "communication"
competences:
  - id: "communication-1"
    title: "Communication écrite"
    summary: "Rédaction de contenus clairs, adaptés et à fort impact."
    body: "Production de contenus écrits variés : articles, newsletters, rapports, supports de présentation. Maîtrise du ton et du style en fonction de la cible et du canal. Capacité à vulgariser des sujets complexes pour les rendre accessibles et engageants."
    image: "/assets/images/placeholder.svg"
  - id: "communication-2"
    title: "Prise de parole en public"
    summary: "Présentation confiante et structurée devant différents types d'audiences."
    body: "Animation de réunions, soutenances, pitchs et présentations clients. Maîtrise des techniques de storytelling pour capter l'attention et mémoriser le message clé. Gestion du stress et de la posture pour une communication verbale et non verbale efficace."
    image: "/assets/images/placeholder.svg"
  - id: "communication-3"
    title: "Communication digitale"
    summary: "Déploiement de plans de communication sur les canaux numériques."
    body: "Conception et exécution de plans de communication digitale : site web, réseaux sociaux, emailing, webinaires. Création de messages cohérents avec l'identité de marque et adaptation des formats aux spécificités de chaque plateforme."
    image: "/assets/images/placeholder.svg"
  - id: "communication-4"
    title: "Relations presse & médias"
    summary: "Construction et entretien de relations avec les journalistes et influenceurs."
    body: "Rédaction de communiqués et dossiers de presse, organisation de conférences de presse, gestion du carnet de contacts médias. Suivi des retombées presse et mesure de l'impact des actions RP sur la notoriété de l'organisation."
    image: "/assets/images/placeholder.svg"
  - id: "communication-5"
    title: "Communication interne"
    summary: "Favoriser la cohésion et la transmission de l'information en entreprise."
    body: "Mise en place d'outils et de rituels de communication interne : intranet, newsletters internes, réunions all-hands. Accompagnement du changement par une communication transparente et régulière pour maintenir l'engagement des collaborateurs."
    image: "/assets/images/placeholder.svg"
  - id: "communication-6"
    title: "Gestion de crise"
    summary: "Réponse rapide et maîtrisée face aux situations sensibles."
    body: "Élaboration de plans de communication de crise, rédaction de messages de réponse adaptés aux différentes parties prenantes. Coordination des prises de parole internes et externes pour protéger la réputation de l'organisation en situation d'urgence."
    image: "/assets/images/placeholder.svg"
