title: "Marketing"
slug: "marketing"
competences:
  - id: "marketing-1"
    title: "Stratégie de contenu"
    summary: "Élaboration de plans éditoriaux cohérents avec les objectifs de marque."
    body: "Définition d'une stratégie de contenu alignée sur les cibles marketing : personas, calendrier éditorial, choix des canaux (blog, réseaux sociaux, emailing). Mesure de la performance via des KPIs adaptés (taux d'engagement, trafic organique, conversions)."
    image: "/assets/images/placeholder.svg"
  - id: "marketing-2"
    title: "Marketing digital"
    summary: "Pilotage de campagnes digitales sur les principaux leviers d'acquisition."
    body: "Gestion de campagnes SEA (Google Ads), social ads (Meta, LinkedIn) et emailing. Optimisation des budgets, A/B testing des visuels et messages, analyse des résultats et ajustements en continu pour maximiser le ROI."
    image: "/assets/images/placeholder.svg"
  - id: "marketing-3"
    title: "Analyse de marché"
    summary: "Étude de la concurrence et identification des opportunités de positionnement."
    body: "Réalisation d'études de marché qualitatives et quantitatives : benchmarks concurrentiels, analyses SWOT, interviews clients. Restitution des insights sous forme de recommandations stratégiques actionnables."
    image: "/assets/images/placeholder.svg"
  - id: "marketing-4"
    title: "Identité de marque"
    summary: "Définition et cohérence du discours de marque sur tous les supports."
    body: "Travail sur le positionnement, la tonalité et la charte graphique. Garantie de la cohérence de la marque à travers les différents points de contact : site web, réseaux sociaux, supports print et présentations commerciales."
    image: "/assets/images/placeholder.svg"
  - id: "marketing-5"
    title: "SEO & référencement"
    summary: "Optimisation de la visibilité organique sur les moteurs de recherche."
    body: "Audit SEO technique et éditorial, recherche de mots-clés, optimisation des balises et du maillage interne. Suivi des positions et du trafic via Google Search Console et des outils tiers pour améliorer la visibilité sur le long terme."
    image: "/assets/images/placeholder.svg"
  - id: "marketing-6"
    title: "Gestion des réseaux sociaux"
    summary: "Animation de communautés et création de contenus engageants."
    body: "Élaboration et exécution d'une stratégie social media : création de contenus (visuels, vidéos courtes, carrousels), programmation, modération et analyse des statistiques. Développement de la notoriété et de l'engagement des communautés."
    image: "/assets/images/placeholder.svg"
