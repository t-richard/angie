title: "Marketing"
slug: "marketing"
competences:
  - id: "marketing-1"
    title: "Concevoir et piloter des campagnes d’emailing"
    summary: "?"
    body: "Chez SOFRATEL Entreprise Adaptée, j’ai participé à la mise en place de campagnes d’emailing destinées à développer la visibilité de l’entreprise et à générer de nouveaux contacts. J’ai contribué à la création des messages, à la constitution des bases de données sur Google Sheets ainsi qu’au suivi des résultats obtenus."
    image: "assets/images/Screenshot 2026-06-13 15.40.28.png"
  - id: "marketing-2"
    title: "Analyser les performances des actions marketing"
    summary: "?"
    body: "L’analyse des résultats constitue une étape essentielle dans toute action marketing. Lors de mes campagnes d’emailing, j’ai suivi différents indicateurs tels que les taux d’ouverture, les clics ou encore les retours obtenus afin d’identifier les axes d’amélioration possibles. Cette démarche permet d’optimiser les actions futures et d’améliorer leur efficacité."
    image: "assets/images/Screenshot 2026-06-13 10.23.03.png"
  - id: "marketing-3"
    title: "Analyse de marché"
    summary: "Étude de la concurrence et identification des opportunités de positionnement."
    body: "Réalisation d'études de marché qualitatives et quantitatives durant mes différentes expériences professionnels"
    image: "assets/images/Screenshot 2026-06-13 10.29.18.png"
  - id: "marketing-4"
    title: "Identifier les attentes clients pour améliorer l’offre"
    summary: "?"
    body: "Grâce aux échanges réguliers avec les clients en point de vente, j’ai pu identifier plusieurs besoins récurrents et les transmettre aux responsables de l’entreprise. Cette remontée d’informations a notamment contribué à la réflexion autour de nouveaux formats de produits répondant davantage aux attentes des consommateurs."
    image: "assets/images/Screenshot 2026-06-13 10.34.27.png"
