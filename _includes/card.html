<article
  class="card"
  data-modal-trigger
  data-title="{{ include.competence.title }}"
  data-body="{{ include.competence.body }}"
  data-image="{{ include.competence.image | relative_url }}"
  tabindex="0"
  role="button"
  aria-label="Voir : {{ include.competence.title }}"
>
  <div class="card__media">
    <img
      class="card__image"
      src="{{ include.competence.image | relative_url }}"
      alt="{{ include.competence.title }}"
    >
    <span class="card__num">{{ include.index | prepend: '0' }}</span>
  </div>
  <div class="card__body">
    <h2 class="card__title">{{ include.competence.title }}</h2>
    <p class="card__summary">{{ include.competence.summary }}</p>
    <span class="card__cue">Lire <span aria-hidden="true">→</span></span>
  </div>
</article>
