---
layout: default
title: "Accueil"
---

<p id="header-tagline">Bienvenue sur mon portfolio</p>

<div class="profile">
  <img
    class="profile__photo"
    src="{{ site.data.profile.photo | relative_url }}"
    alt="Photo de {{ site.data.profile.name }}"
  >
  <div class="profile__info">
    <h1 class="profile__name">{{ site.data.profile.name }}</h1>
    <p class="profile__title">{{ site.data.profile.title }}</p>
    <p class="profile__description">{{ site.data.profile.description }}</p>
    <ul class="profile__interests">
      {% for interest in site.data.profile.interests %}
        <li class="profile__interest-tag">{{ interest }}</li>
      {% endfor %}
    </ul>
    <a class="profile__qr" href="{{ site.data.profile.linkedin_url }}" target="_blank" rel="noopener">
      <img src="{{ site.data.profile.qr_code | relative_url }}" alt="QR code LinkedIn">
      <span class="profile__qr-label">LinkedIn</span>
    </a>
  </div>
</div>
